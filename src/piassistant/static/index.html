<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiAssistant</title>
<link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>

<header>
  <div>
    <h1>PiAssistant</h1>
    <div id="status" class="status">connecting...</div>
  </div>
  <div class="header-actions">
    <button onclick="resetChat()">New Chat</button>
    <button onclick="shutdownPi()" style="color:var(--accent)">Shutdown</button>
  </div>
</header>

<div id="widgets">
  <!-- Weather -->
  <div class="widget" id="weather-widget">
    <h2>Weather</h2>
    <div id="weather-content"><div class="empty-state">Loading...</div></div>
  </div>

  <!-- Sessions -->
  <div class="widget" id="sessions-widget">
    <h2>Claude Code <span class="count" id="sessions-count">0</span></h2>
    <div id="sessions-content"><div class="empty-state">No active sessions</div></div>
  </div>

  <!-- Timers -->
  <div class="widget" id="timers-widget">
    <h2>Timers <span class="count" id="timers-count">0</span></h2>
    <div id="timers-content"><div class="empty-state">No active timers</div></div>
  </div>

  <!-- Reminders -->
  <div class="widget" id="reminders-widget">
    <h2>Reminders <span class="count" id="reminders-count">0</span></h2>
    <div id="reminders-content"><div class="empty-state">No reminders</div></div>
  </div>

  <!-- Grocery -->
  <div class="widget" id="grocery-widget" style="grid-column: span 2">
    <h2>Grocery <span class="count" id="grocery-count">0</span></h2>
    <div id="grocery-content"><div class="empty-state">Grocery list empty</div></div>
  </div>

  <!-- Notes -->
  <div class="widget" id="notes-widget">
    <h2>Notes</h2>
    <div id="notes-content"><div class="empty-state">No notes</div></div>
  </div>

  <!-- Todos -->
  <div class="widget" id="todos-widget">
    <h2>To-Do <span class="count" id="todos-count">0</span></h2>
    <div id="todos-content"><div class="empty-state">No to-dos</div></div>
  </div>
</div>

<div id="chat-area">
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="msg-input" rows="1" placeholder="Ask me anything..." autofocus></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- Timer alert overlay -->
<div id="timer-alert">
  <div id="timer-alert-text"></div>
  <button onclick="dismissTimerAlert()">Dismiss</button>
</div>

<script src="/static/js/dashboard.js"></script>

</body>
</html>
