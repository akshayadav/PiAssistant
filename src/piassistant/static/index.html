<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiAssistant</title>
<link rel="stylesheet" href="/static/css/dashboard.css?v=10">
</head>
<body>

<header>
  <div>
    <h1>PiAssistant</h1>
    <div id="status" class="status">connecting...</div>
  </div>
  <div class="header-actions">
    <button onclick="resetChat()">New Chat</button>
    <button onclick="shutdownPi()" style="color:var(--accent)">Shutdown</button>
  </div>
</header>

<div id="main-scroll">
<div id="widgets">
  <!-- Weather -->
  <div class="widget" id="weather-widget" style="grid-column: span 2">
    <h2>Weather <span class="count" id="weather-count">0</span>
      <button class="widget-add-btn" onclick="toggleWeatherForm()" title="Add city">+</button>
    </h2>
    <div id="weather-add-form" style="display:none;margin-bottom:8px">
      <form onsubmit="addWeatherCity(event)" style="display:flex;gap:6px">
        <input type="text" id="weather-city-input" placeholder="City, State/Country" style="flex:1;padding:4px 8px;background:var(--bg);border:1px solid #ffffff20;border-radius:6px;color:var(--text);font-size:0.8rem">
        <button type="submit" style="padding:4px 10px;background:var(--accent);border:none;border-radius:6px;color:white;font-size:0.8rem;cursor:pointer">Add</button>
      </form>
    </div>
    <div id="weather-content"><div class="empty-state">Loading...</div></div>
  </div>

  <!-- Sessions -->
  <div class="widget" id="sessions-widget">
    <h2>Claude Code <span class="count" id="sessions-count">0</span>
      <button class="widget-add-btn" onclick="fetchSessions()" title="Refresh sessions">↻</button>
    </h2>
    <div id="sessions-content"><div class="empty-state">No active sessions</div></div>
  </div>

  <!-- Timers -->
  <div class="widget" id="timers-widget">
    <h2>Timers <span class="count" id="timers-count">0</span></h2>
    <div id="timers-content"><div class="empty-state">No active timers</div></div>
  </div>

  <!-- Reminders -->
  <div class="widget" id="reminders-widget">
    <h2>Reminders <span class="count" id="reminders-count">0</span></h2>
    <div id="reminders-content"><div class="empty-state">No reminders</div></div>
  </div>

  <!-- News -->
  <div class="widget" id="news-widget" style="grid-column: span 2">
    <h2>News <span class="count" id="news-count">0</span>
      <button class="widget-add-btn" id="news-tts-btn" onclick="speakNews()" title="Read headlines aloud">▶ Read</button>
      <button class="widget-add-btn" onclick="toggleNewsForm()" title="Add feed">+</button>
    </h2>
    <div id="news-add-form" style="display:none;margin-bottom:8px">
      <form onsubmit="addNewsFeed(event)" style="display:flex;gap:6px;flex-wrap:wrap">
        <input type="text" id="news-feed-name" placeholder="Feed name" style="width:100px;padding:4px 8px;background:var(--bg);border:1px solid #ffffff20;border-radius:6px;color:var(--text);font-size:0.8rem">
        <select id="news-feed-provider" style="padding:4px 8px;background:var(--bg);border:1px solid #ffffff20;border-radius:6px;color:var(--text);font-size:0.8rem">
          <option value="newsapi">NewsAPI</option>
          <option value="newsdata">Newsdata.io</option>
        </select>
        <select id="news-feed-type" onchange="toggleNewsFields()" style="padding:4px 8px;background:var(--bg);border:1px solid #ffffff20;border-radius:6px;color:var(--text);font-size:0.8rem">
          <option value="headlines">Headlines</option>
          <option value="search">Search</option>
        </select>
        <input type="text" id="news-feed-country" placeholder="Country (us, in)" value="us" style="width:60px;padding:4px 8px;background:var(--bg);border:1px solid #ffffff20;border-radius:6px;color:var(--text);font-size:0.8rem">
        <input type="text" id="news-feed-query" placeholder="Search query" style="display:none;width:140px;padding:4px 8px;background:var(--bg);border:1px solid #ffffff20;border-radius:6px;color:var(--text);font-size:0.8rem">
        <button type="submit" style="padding:4px 10px;background:var(--accent);border:none;border-radius:6px;color:white;font-size:0.8rem;cursor:pointer">Add</button>
      </form>
    </div>
    <div id="news-content"><div class="empty-state">Loading...</div></div>
  </div>

  <!-- Orders -->
  <div class="widget" id="orders-widget" style="grid-column: span 2">
    <h2>Orders <span class="count" id="orders-count">0</span>
      <button class="widget-add-btn" onclick="refreshOrders()" title="Refresh from Amazon">↻</button>
    </h2>
    <div id="orders-content"><div class="empty-state">Loading...</div></div>
  </div>

  <!-- Grocery -->
  <div class="widget" id="grocery-widget" style="grid-column: span 2">
    <h2>Grocery <span class="count" id="grocery-count">0</span></h2>
    <div id="grocery-content"><div class="empty-state">Grocery list empty</div></div>
  </div>

  <!-- Notes -->
  <div class="widget" id="notes-widget">
    <h2>Notes</h2>
    <div id="notes-content"><div class="empty-state">No notes</div></div>
  </div>

  <!-- Todos -->
  <div class="widget" id="todos-widget">
    <h2>To-Do <span class="count" id="todos-count">0</span></h2>
    <div id="todos-content"><div class="empty-state">No to-dos</div></div>
  </div>
</div>

<div id="chat-area">
  <div id="messages"></div>
</div>
</div><!-- end main-scroll -->

<div id="input-area">
  <textarea id="msg-input" rows="1" placeholder="Ask me anything..." autofocus></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<!-- Timer alert overlay -->
<div id="timer-alert">
  <div id="timer-alert-text"></div>
  <button onclick="dismissTimerAlert()">Dismiss</button>
</div>

<script src="/static/js/dashboard.js?v=10"></script>

</body>
</html>
